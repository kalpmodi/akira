<svg width="1280" height="640" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1280" height="640" fill="#0d1117"/>

  <!-- Subtle grid lines -->
  <g stroke="#1a2233" stroke-width="1" opacity="0.5">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
  </g>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="640" fill="#bd93f9"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1280" height="4" fill="#bd93f9"/>

  <!-- AKIRA title -->
  <text x="640" y="200" font-family="'Courier New', Courier, monospace" font-size="120" font-weight="bold"
        fill="#bd93f9" text-anchor="middle" letter-spacing="16">AKIRA</text>

  <!-- Tagline -->
  <text x="640" y="280" font-family="'Courier New', Courier, monospace" font-size="28"
        fill="#f8f8f2" text-anchor="middle">The AI Pentest Co-Pilot That Actually Finds Bugs</text>

  <!-- Phase chain -->
  <text x="640" y="360" font-family="'Courier New', Courier, monospace" font-size="18"
        fill="#6272a4" text-anchor="middle">plan-engagement  →  recon  →  secrets  →  exploit  →  triage  →  report</text>

  <!-- Badges row -->
  <!-- Evidence-gated badge -->
  <rect x="260" y="410" width="190" height="36" rx="6" fill="#1a2233"/>
  <text x="355" y="433" font-family="'Courier New', Courier, monospace" font-size="14"
        fill="#50fa7b" text-anchor="middle">evidence-gated</text>

  <!-- Phase-chained badge -->
  <rect x="470" y="410" width="180" height="36" rx="6" fill="#1a2233"/>
  <text x="560" y="433" font-family="'Courier New', Courier, monospace" font-size="14"
        fill="#ff79c6" text-anchor="middle">phase-chained</text>

  <!-- Multi-platform badge -->
  <rect x="670" y="410" width="180" height="36" rx="6" fill="#1a2233"/>
  <text x="760" y="433" font-family="'Courier New', Courier, monospace" font-size="14"
        fill="#8be9fd" text-anchor="middle">multi-platform</text>

  <!-- MIT license badge -->
  <rect x="870" y="410" width="150" height="36" rx="6" fill="#1a2233"/>
  <text x="945" y="433" font-family="'Courier New', Courier, monospace" font-size="14"
        fill="#f1fa8c" text-anchor="middle">MIT licensed</text>

  <!-- Skill count -->
  <text x="640" y="510" font-family="'Courier New', Courier, monospace" font-size="20"
        fill="#6272a4" text-anchor="middle">12 skills  ·  6 platforms  ·  updated weekly</text>

  <!-- GitHub URL -->
  <text x="640" y="575" font-family="'Courier New', Courier, monospace" font-size="22"
        fill="#bd93f9" text-anchor="middle">github.com/Kalp1774/akira</text>

  <!-- Bottom accent -->
  <rect x="0" y="636" width="1280" height="4" fill="#bd93f9"/>
</svg>
