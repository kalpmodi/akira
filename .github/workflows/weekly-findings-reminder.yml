name: Weekly FINDINGS.md Reminder

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9am UTC
  workflow_dispatch:      # Manual trigger

permissions:
  issues: write
  contents: read

jobs:
  reminder:
    runs-on: ubuntu-latest
    name: Create weekly findings update reminder

    steps:
      - uses: actions/checkout@v6

      - name: Get last FINDINGS.md update
        id: last-update
        run: |
          LAST=$(git log -1 --format="%ar" -- FINDINGS.md)
          echo "last_update=$LAST" >> $GITHUB_OUTPUT
          COUNT=$(grep -c "^\| [0-9]" FINDINGS.md 2>/dev/null || echo "0")
          echo "finding_count=$COUNT" >> $GITHUB_OUTPUT

      - name: Create reminder issue
        uses: actions/github-script@v7
        with:
          script: |
            const lastUpdate = '${{ steps.last-update.outputs.last_update }}';
            const count = '${{ steps.last-update.outputs.finding_count }}';
            const today = new Date().toISOString().split('T')[0];

            // Only create if FINDINGS.md hasn't been updated this week
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[weekly] FINDINGS.md update - ${today}`,
              body: `## Weekly FINDINGS.md Update\n\nLast update: **${lastUpdate}**\nCurrent findings: **${count}**\n\nFound any bugs with Akira this week? Update FINDINGS.md to keep it alive.\n\nSee [SECURITY.md](../blob/main/SECURITY.md) for submission format.\n\n_This issue is auto-created weekly. Close it when FINDINGS.md is updated or if nothing new this week._`,
              labels: ['findings-update']
            });
